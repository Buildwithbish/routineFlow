<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoutineFlow Pro — Your Personal Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌊%3C/text%3E%3C/svg%3E">
<style>
  :root {
    /* SKY BLUE PROFESSIONAL PALETTE */
    --bg: #F0F7FF;
    --bg-2: #E4EFFF;
    --surface: #FFFFFF;
    --surface-2: #F5FAFF;
    --surface-3: #EAF3FF;
    --border: #D6E5F5;
    --border-strong: #B8D0EA;

    --ink: #0F1E33;
    --ink-2: #2C3E5B;
    --ink-3: #6B7E96;
    --ink-4: #9BAEC4;

    /* Primary sky blue */
    --sky-50: #F0F7FF;
    --sky-100: #DBEAFE;
    --sky-200: #BFDBFE;
    --sky-300: #93C5FD;
    --sky-400: #60A5FA;
    --sky-500: #3B82F6;
    --sky-600: #2563EB;
    --sky-700: #1D4ED8;

    /* Accent colors for categories */
    --emerald: #10B981;
    --emerald-light: #D1FAE5;
    --amber: #F59E0B;
    --amber-light: #FEF3C7;
    --violet: #8B5CF6;
    --violet-light: #EDE9FE;
    --rose: #F43F5E;
    --rose-light: #FFE4E6;
    --cyan: #06B6D4;
    --cyan-light: #CFFAFE;
    --indigo: #6366F1;

    --shadow-sm: 0 1px 2px rgba(15,30,51,.04), 0 1px 1px rgba(15,30,51,.03);
    --shadow-md: 0 4px 12px rgba(15,30,51,.06), 0 2px 4px rgba(15,30,51,.04);
    --shadow-lg: 0 12px 32px rgba(15,30,51,.08), 0 4px 8px rgba(15,30,51,.04);
    --shadow-blue: 0 8px 24px rgba(59,130,246,.25);
    --shadow-emerald: 0 8px 24px rgba(16,185,129,.25);

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); background-clip: padding-box; }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    background: var(--bg);
  }

  /* SIDEBAR - Clean professional */
  .sidebar {
    background: linear-gradient(180deg, #FFFFFF 0%, #F5FAFF 100%);
    border-right: 1px solid var(--border);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 8px 24px;
  }
  .brand-mark {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--sky-500), var(--sky-700));
    display: grid;
    place-items: center;
    font-size: 20px;
    box-shadow: var(--shadow-blue);
    color: #fff;
    font-weight: 800;
  }
  .brand-name {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    line-height: 1;
    font-style: italic;
    color: var(--ink);
  }
  .brand-sub { font-size: 10px; color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; font-weight: 600; }

  /* HERO ROUTINE BUTTON */
  .routine-hero {
    background: linear-gradient(135deg, var(--sky-500) 0%, var(--sky-700) 100%);
    color: #fff;
    padding: 16px 14px;
    border-radius: var(--radius-lg);
    margin-bottom: 16px;
    box-shadow: var(--shadow-blue);
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .routine-hero:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(59,130,246,.35); }
  .routine-hero::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(255,255,255,.15), transparent 70%);
    pointer-events: none;
  }
  .routine-hero.active { box-shadow: 0 0 0 3px rgba(59,130,246,.3), var(--shadow-blue); }
  .routine-hero-icon { font-size: 22px; margin-bottom: 6px; }
  .routine-hero-title { font-family: 'Instrument Serif', serif; font-size: 20px; font-style: italic; line-height: 1; margin-bottom: 4px; }
  .routine-hero-sub { font-size: 11px; opacity: .9; letter-spacing: .04em; }

  .nav-section-label {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-4);
    padding: 14px 12px 4px;
    font-weight: 700;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--ink-2);
    font-weight: 500;
    font-size: 13.5px;
    transition: all .15s ease;
    width: 100%;
    text-align: left;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-3); color: var(--ink); }
  .nav-item.active {
    background: var(--sky-100);
    color: var(--sky-700);
    font-weight: 600;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: -14px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 22px;
    background: var(--sky-600);
    border-radius: 0 3px 3px 0;
  }
  .nav-item .icon { font-size: 17px; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
  }
  .user-card:hover { background: var(--surface-3); }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sky-400), var(--indigo));
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 14px;
    overflow: hidden;
    background-size: cover;
    background-position: center;
  }
  .user-name { font-weight: 600; font-size: 13px; }
  .user-tier { font-size: 10.5px; color: var(--ink-3); }

  /* MAIN */
  .main {
    overflow-y: auto;
    padding: 28px 36px 60px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .greeting {
    font-family: 'Instrument Serif', serif;
    font-size: 40px;
    line-height: 1.05;
    font-weight: 400;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  .greeting em { font-style: italic; color: var(--sky-600); }
  .date-line { color: var(--ink-3); margin-top: 6px; font-size: 13px; letter-spacing: .01em; }
  .accent-line {
    display: inline-block;
    width: 44px;
    height: 3px;
    background: linear-gradient(90deg, var(--sky-500), var(--cyan));
    border-radius: 2px;
    margin-top: 10px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* BUTTONS */
  .btn {
    padding: 9px 14px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-weight: 500;
    font-size: 13px;
    transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 7px;
    color: var(--ink-2);
  }
  .btn:hover { border-color: var(--sky-400); color: var(--sky-700); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn-primary {
    background: var(--sky-600);
    color: #fff;
    border-color: var(--sky-600);
  }
  .btn-primary:hover { background: var(--sky-700); border-color: var(--sky-700); color: #fff; box-shadow: var(--shadow-blue); }
  .btn-success {
    background: var(--emerald);
    color: #fff;
    border-color: var(--emerald);
  }
  .btn-success:hover { background: #059669; border-color: #059669; color: #fff; box-shadow: var(--shadow-emerald); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-3); }

  /* STAT ROW */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: all .2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .stat-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
    margin-bottom: 12px;
  }
  .icon-tasks { background: var(--sky-100); color: var(--sky-700); }
  .icon-habits { background: var(--emerald-light); color: #047857; }
  .icon-meals { background: var(--amber-light); color: #B45309; }
  .icon-gym { background: var(--violet-light); color: #6D28D9; }
  .stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    line-height: 1;
    font-weight: 400;
    color: var(--ink);
  }
  .stat-value small { font-size: 15px; color: var(--ink-3); font-family: inherit; }
  .stat-label {
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }
  .stat-progress {
    height: 4px;
    background: var(--surface-3);
    border-radius: 3px;
    margin-top: 10px;
    overflow: hidden;
  }
  .stat-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s cubic-bezier(.2,.9,.2,1);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .card-title .badge {
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-3);
    color: var(--ink-3);
    font-weight: 600;
    letter-spacing: .02em;
  }
  .card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-title-row .card-title { margin-bottom: 0; }

  /* ROUTINE PAGE - Calendar style */
  .routine-mode-tabs {
    display: inline-flex;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .routine-tab {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-3);
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .routine-tab.active {
    background: linear-gradient(135deg, var(--sky-500), var(--sky-600));
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(59,130,246,.3);
  }
  .routine-tab:not(.active):hover { background: var(--surface-3); color: var(--ink-2); }

  /* GOOGLE CALENDAR STYLE DAY VIEW */
  .day-calendar {
    display: grid;
    grid-template-columns: 50px 1fr;
    max-height: 600px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .cal-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-4);
    padding: 8px 6px 0 0;
    text-align: right;
  }
  .cal-slot {
    border-top: 1px solid var(--surface-3);
    min-height: 44px;
    padding: 4px 0;
    position: relative;
  }
  .cal-event {
    background: linear-gradient(90deg, var(--sky-100), var(--sky-50));
    border-left: 3px solid var(--sky-500);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .cal-event:hover { transform: translateX(2px); box-shadow: var(--shadow-sm); }
  .cal-event.uni { background: linear-gradient(90deg, var(--sky-100), #EFF6FF); border-left-color: var(--sky-500); }
  .cal-event.work { background: linear-gradient(90deg, var(--violet-light), #F5F3FF); border-left-color: var(--violet); }
  .cal-event.fitness { background: linear-gradient(90deg, var(--emerald-light), #ECFDF5); border-left-color: var(--emerald); }
  .cal-event.meal { background: linear-gradient(90deg, var(--amber-light), #FFFBEB); border-left-color: var(--amber); }
  .cal-event.personal { background: linear-gradient(90deg, var(--rose-light), #FFF1F2); border-left-color: var(--rose); }
  .cal-event-title { font-weight: 600; font-size: 13px; color: var(--ink); }
  .cal-event-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .cal-event-photo {
    width: 40px; height: 40px; border-radius: 8px;
    background: var(--sky-200);
    display: grid; place-items: center;
    flex-shrink: 0;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    font-size: 18px;
  }

  /* WEEK GRID */
  .week-cal {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    gap: 4px;
    max-height: 600px;
    overflow-y: auto;
  }
  .week-header {
    padding: 8px 4px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
  }
  .week-header.today {
    color: var(--sky-600);
  }
  .week-header .wh-day-num {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    display: block;
    margin-top: 2px;
    color: var(--ink);
  }
  .week-header.today .wh-day-num { color: var(--sky-600); }
  .week-slot {
    min-height: 42px;
    border-top: 1px solid var(--surface-3);
    padding: 2px;
    position: relative;
  }
  .week-time-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-4);
    text-align: right;
    padding: 4px 6px 0 0;
    border-top: 1px solid transparent;
  }
  .week-event {
    background: var(--sky-100);
    border-left: 2px solid var(--sky-500);
    border-radius: 5px;
    padding: 3px 5px;
    font-size: 10.5px;
    line-height: 1.3;
    color: var(--sky-700);
    cursor: pointer;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .week-event.uni { background: var(--sky-100); border-left-color: var(--sky-500); color: var(--sky-700); }
  .week-event.work { background: var(--violet-light); border-left-color: var(--violet); color: #6D28D9; }
  .week-event.fitness { background: var(--emerald-light); border-left-color: var(--emerald); color: #047857; }
  .week-event.meal { background: var(--amber-light); border-left-color: var(--amber); color: #B45309; }
  .week-event.personal { background: var(--rose-light); border-left-color: var(--rose); color: #BE123C; }

  /* MONTH GRID */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .month-day-header {
    font-size: 10px;
    text-align: center;
    color: var(--ink-3);
    padding: 6px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .month-day {
    aspect-ratio: 1;
    background: var(--surface-2);
    border-radius: 8px;
    padding: 6px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .month-day:hover { background: var(--surface); border-color: var(--sky-300); }
  .month-day.today {
    background: linear-gradient(135deg, var(--sky-500), var(--sky-600));
    color: #fff;
    font-weight: 700;
  }
  .month-day-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--sky-500);
    margin-top: auto;
    align-self: flex-start;
  }
  .month-day.today .month-day-dot { background: #fff; }

  /* TASK LIST */
  .task-list { display: flex; flex-direction: column; gap: 4px; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: all .15s;
    cursor: pointer;
  }
  .task-item:hover { background: var(--surface-2); border-color: var(--border); }
  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border-strong);
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all .15s;
    background: #fff;
  }
  .task-item.done .task-check {
    background: var(--emerald);
    border-color: var(--emerald);
  }
  .task-item.done .task-title { text-decoration: line-through; color: var(--ink-4); }
  .task-check svg { width: 12px; height: 12px; opacity: 0; }
  .task-item.done .task-check svg { opacity: 1; }
  .task-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--ink); }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .task-photo-thumb {
    width: 28px; height: 28px; border-radius: 6px;
    background-size: cover; background-position: center;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chip {
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: .02em;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .chip-uni { background: var(--sky-100); color: var(--sky-700); }
  .chip-work { background: var(--violet-light); color: #6D28D9; }
  .chip-personal { background: var(--rose-light); color: #BE123C; }
  .chip-fitness { background: var(--emerald-light); color: #047857; }
  .chip-meal { background: var(--amber-light); color: #B45309; }
  .chip-high { background: var(--rose-light); color: #E11D48; }
  .chip-med { background: var(--amber-light); color: #B45309; }
  .chip-low { background: var(--surface-3); color: var(--ink-3); }
  .chip-time { background: var(--surface-3); color: var(--ink-2); font-family: 'JetBrains Mono', monospace; }

  /* DASHBOARD GRID */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 18px;
  }
  .dashboard-grid.reversed { grid-template-columns: 1fr 2fr; }

  /* HABITS */
  .habit-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .habit-row:last-child { border-bottom: none; }
  .habit-info { display: flex; align-items: center; gap: 12px; }
  .habit-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .habit-details .habit-name { font-weight: 600; font-size: 13.5px; color: var(--ink); }
  .habit-details .habit-streak { font-size: 11px; color: var(--ink-3); }
  .habit-days { display: flex; gap: 4px; }
  .habit-day {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--surface-3);
    display: grid; place-items: center;
    font-size: 10px; font-weight: 700;
    color: var(--ink-3);
    cursor: pointer;
    transition: all .15s;
  }
  .habit-day.done {
    background: var(--emerald);
    color: #fff;
  }
  .habit-day.today {
    box-shadow: 0 0 0 2px var(--sky-500);
  }

  /* INSTAGRAM-STYLE PROFILE */
  .profile-header {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 32px;
    display: flex;
    gap: 32px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .profile-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(135deg, var(--sky-500), var(--cyan));
    opacity: .08;
  }
  .profile-avatar {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sky-400), var(--indigo));
    padding: 4px;
    position: relative;
    z-index: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .profile-avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #fff;
    padding: 3px;
  }
  .profile-avatar-photo {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sky-400), var(--indigo));
    display: grid; place-items: center;
    color: #fff;
    font-size: 48px;
    font-weight: 800;
    background-size: cover;
    background-position: center;
  }
  .profile-info { flex: 1; position: relative; z-index: 1; }
  .profile-name-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .profile-name { font-family: 'Instrument Serif', serif; font-size: 32px; font-weight: 400; color: var(--ink); }
  .profile-handle { font-size: 14px; color: var(--ink-3); }
  .profile-bio { font-size: 13.5px; color: var(--ink-2); line-height: 1.6; margin-bottom: 16px; max-width: 500px; }
  .profile-stats { display: flex; gap: 32px; }
  .profile-stat { text-align: left; }
  .profile-stat-num {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
  }
  .profile-stat-label { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; margin-top: 4px; }

  .profile-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin: 20px 0;
    justify-content: center;
  }
  .profile-tab {
    padding: 12px 24px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--ink-3);
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .profile-tab.active {
    color: var(--ink);
    border-bottom-color: var(--sky-600);
  }

  .profile-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .profile-post {
    aspect-ratio: 1;
    background: var(--surface-3);
    border-radius: 4px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    display: grid;
    place-items: center;
    font-size: 32px;
    background-size: cover;
    background-position: center;
    transition: all .2s;
  }
  .profile-post:hover { transform: scale(0.98); }
  .profile-post-overlay {
    position: absolute; inset: 0;
    background: rgba(15,30,51,.6);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-size: 13px;
    font-weight: 600;
  }
  .profile-post:hover .profile-post-overlay { display: flex; }

  /* HEVY-STYLE FITNESS */
  .fitness-header {
    background: linear-gradient(135deg, var(--emerald) 0%, #059669 100%);
    color: #fff;
    padding: 28px;
    border-radius: var(--radius-lg);
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-emerald);
  }
  .fitness-header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(255,255,255,.15), transparent 70%);
  }
  .fitness-title { font-family: 'Instrument Serif', serif; font-size: 28px; font-style: italic; margin-bottom: 6px; position: relative; }
  .fitness-sub { font-size: 13px; opacity: .95; position: relative; }
  .fitness-stat-row { display: flex; gap: 24px; margin-top: 20px; position: relative; }
  .fitness-stat { }
  .fitness-stat-num { font-family: 'Instrument Serif', serif; font-size: 26px; }
  .fitness-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; opacity: .9; font-weight: 600; }

  .workout-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    transition: all .2s;
  }
  .workout-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
  .workout-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .workout-card-title {
    font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px;
    color: var(--ink);
  }
  .workout-day-badge {
    font-size: 10.5px; padding: 3px 8px;
    border-radius: 999px; background: var(--emerald-light); color: #047857;
    font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  }
  .exercise-row {
    display: grid;
    grid-template-columns: 30px 1fr 70px 60px 24px;
    align-items: center;
    padding: 8px 12px;
    background: var(--surface-2);
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 13px;
    gap: 10px;
  }
  .exercise-num {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--sky-100); color: var(--sky-700);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .exercise-name { font-weight: 500; color: var(--ink); }
  .exercise-sets { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-2); text-align: right; }
  .exercise-weight { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-3); text-align: right; }
  .exercise-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border-strong);
    cursor: pointer;
    background: #fff;
    display: grid; place-items: center;
  }
  .exercise-row.done .exercise-check { background: var(--emerald); border-color: var(--emerald); color: #fff; }
  .exercise-row.done .exercise-name { text-decoration: line-through; color: var(--ink-4); }

  .pr-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #FBBF24, #F59E0B);
    color: #78350F;
    padding: 2px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700;
    margin-left: 6px;
  }

  /* MEALS / MYFITNESSPAL STYLE */
  .macro-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }
  .macro {
    padding: 16px;
    border-radius: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
  }
  .macro-value {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    line-height: 1;
    color: var(--ink);
  }
  .macro-value small { font-size: 13px; color: var(--ink-3); font-family: inherit; }
  .macro-label { font-size: 10.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; font-weight: 700; }
  .macro-bar { height: 4px; background: var(--surface-3); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .macro-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }

  .meal-block { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .meal-block:last-child { border-bottom: none; }
  .meal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .meal-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--ink); }
  .meal-cal { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-3); }
  .food-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--surface-2);
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 4px;
    border: 1px solid var(--border);
  }
  .food-item .food-name { color: var(--ink-2); font-weight: 500; }
  .food-item .food-info { color: var(--ink-3); font-size: 11px; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .add-food-btn {
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    color: var(--ink-3);
    font-size: 12px;
    width: 100%;
    margin-top: 6px;
    font-weight: 600;
    transition: all .15s;
  }
  .add-food-btn:hover { border-color: var(--sky-500); color: var(--sky-700); background: var(--sky-50); }

  /* AI QUICK LOG - MyFitnessPal Style */
  .ai-quick-log {
    background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
    border: 1px solid var(--sky-300);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
  }
  .ai-quick-log-title {
    font-weight: 700; font-size: 13px; color: var(--sky-700);
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .ai-quick-log-input {
    display: flex; gap: 8px;
  }
  .ai-quick-log-input input {
    flex: 1;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 13px;
  }
  .ai-quick-log-input input:focus { outline: none; border-color: var(--sky-500); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

  /* COACH BISH CHAT */
  .coach-hero {
    background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A855F7 100%);
    color: #fff;
    border-radius: var(--radius-xl);
    padding: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 12px 32px rgba(139,92,246,.3);
  }
  .coach-hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(255,255,255,.2), transparent 70%);
  }
  .coach-hero-content { display: flex; align-items: center; gap: 20px; position: relative; }
  .coach-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #FCD34D, #F59E0B);
    display: grid; place-items: center;
    font-size: 36px;
    box-shadow: 0 8px 20px rgba(0,0,0,.15);
    flex-shrink: 0;
  }
  .coach-name { font-family: 'Instrument Serif', serif; font-size: 30px; font-style: italic; line-height: 1; }
  .coach-role { font-size: 13px; opacity: .9; margin-top: 4px; letter-spacing: .02em; }
  .coach-status { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; background: rgba(255,255,255,.15); padding: 4px 10px; border-radius: 999px; backdrop-filter: blur(10px); }
  .coach-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #34D399; box-shadow: 0 0 0 2px rgba(52,211,153,.3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity: .5; } }

  .chat-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    height: 520px;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-msg {
    display: flex;
    gap: 10px;
    max-width: 85%;
    animation: msgIn .3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .chat-msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .chat-msg.coach .chat-msg-avatar {
    background: linear-gradient(135deg, #FCD34D, #F59E0B);
  }
  .chat-msg.user .chat-msg-avatar {
    background: linear-gradient(135deg, var(--sky-400), var(--indigo));
    color: #fff;
    font-weight: 700;
    font-size: 13px;
  }
  .chat-msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
  }
  .chat-msg.coach .chat-msg-bubble {
    background: var(--surface-2);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user .chat-msg-bubble {
    background: linear-gradient(135deg, var(--sky-500), var(--sky-600));
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg-bubble strong { font-weight: 700; }

  .chat-typing {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 14px;
  }
  .chat-typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink-3);
    animation: typing 1.4s infinite ease-in-out both;
  }
  .chat-typing-dot:nth-child(1) { animation-delay: -.32s; }
  .chat-typing-dot:nth-child(2) { animation-delay: -.16s; }
  @keyframes typing { 0%,80%,100% { transform: scale(0); opacity: .5; } 40% { transform: scale(1); opacity: 1; } }

  .chat-input-bar {
    display: flex;
    gap: 8px;
    padding: 14px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  }
  .chat-input-bar input {
    flex: 1;
    padding: 11px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 14px;
  }
  .chat-input-bar input:focus { outline: none; border-color: var(--sky-500); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .chat-send {
    padding: 11px 20px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--sky-500), var(--sky-600));
    color: #fff;
    font-weight: 600;
    font-size: 13.5px;
    transition: all .15s;
  }
  .chat-send:hover { box-shadow: var(--shadow-blue); }
  .chat-send:disabled { opacity: .5; cursor: not-allowed; }

  .quick-prompt-row {
    display: flex; gap: 8px; padding: 0 14px 12px; flex-wrap: wrap;
  }
  .quick-prompt {
    padding: 6px 12px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--ink-2);
    transition: all .15s;
  }
  .quick-prompt:hover { background: var(--sky-100); color: var(--sky-700); border-color: var(--sky-300); }

  /* AI IMPORT */
  .ai-import-card {
    background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 50%, #E0E7FF 100%);
    border: 1px solid var(--sky-200);
    border-radius: var(--radius-xl);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .ai-import-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(59,130,246,.15), transparent 70%);
    pointer-events: none;
  }
  .drop-zone {
    background: #fff;
    border: 2px dashed var(--sky-300);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    transition: all .2s;
    cursor: pointer;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragging {
    border-color: var(--sky-500);
    background: var(--sky-50);
  }
  .drop-zone-icon { font-size: 36px; margin-bottom: 10px; }
  .drop-zone-title { font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 4px; }
  .drop-zone-sub { font-size: 11.5px; color: var(--ink-3); }
  .drop-zone input[type=file] { display: none; }

  .preview-image {
    max-width: 100%;
    max-height: 280px;
    border-radius: 12px;
    margin-top: 14px;
    box-shadow: var(--shadow-md);
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .ai-textarea {
    width: 100%;
    min-height: 140px;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: #fff;
    font-size: 13.5px;
    line-height: 1.6;
    font-family: inherit;
    resize: vertical;
  }
  .ai-textarea:focus { outline: none; border-color: var(--sky-500); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

  .scope-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .scope-chip {
    padding: 7px 12px;
    border-radius: 999px;
    background: #fff;
    border: 1px solid var(--border);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-2);
    transition: all .15s;
  }
  .scope-chip.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .analyze-btn {
    margin-top: 14px;
    padding: 12px 24px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--sky-500), var(--sky-700));
    color: #fff;
    font-weight: 700;
    font-size: 13.5px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
  }
  .analyze-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-blue); }
  .analyze-btn:disabled { opacity: .5; cursor: not-allowed; }

  .extracted-item {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface-2);
    border-radius: 10px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
  }
  .extracted-item.rejected { opacity: .5; }
  .extracted-item.rejected .item-title { text-decoration: line-through; }
  .item-check {
    width: 20px; height: 20px; border-radius: 6px;
    background: var(--emerald);
    display: grid; place-items: center;
    color: #fff; font-size: 12px;
    cursor: pointer;
  }
  .extracted-item.rejected .item-check {
    background: transparent;
    border: 2px solid var(--border-strong);
    color: transparent;
  }
  .item-title { font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .item-meta { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }

  .confirm-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px;
    background: linear-gradient(135deg, var(--emerald-light), #ECFDF5);
    border: 1px solid #A7F3D0;
    border-radius: var(--radius);
    margin-top: 16px;
  }
  .confirm-count { font-size: 13px; font-weight: 600; color: #047857; }
  .confirm-count .num { font-family: 'Instrument Serif', serif; font-size: 22px; margin-right: 4px; }

  /* PHOTO GALLERY */
  .photo-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .gallery-item {
    aspect-ratio: 1;
    background-size: cover;
    background-position: center;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    display: grid;
    place-items: center;
    background-color: var(--surface-3);
    font-size: 28px;
  }
  .gallery-item:hover { transform: scale(0.98); }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,30,51,.5);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff;
    border-radius: var(--radius-xl);
    padding: 26px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn .3s cubic-bezier(.2,.9,.2,1);
  }
  .modal.wide { max-width: 640px; }
  @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal h3 { font-family: 'Instrument Serif', serif; font-size: 26px; font-weight: 400; margin-bottom: 6px; color: var(--ink); }
  .modal .modal-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 18px; }
  .modal-form { display: flex; flex-direction: column; gap: 12px; }
  .modal-form label { font-size: 11px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; }
  .modal-form input, .modal-form select, .modal-form textarea {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    font-size: 14px;
    color: var(--ink);
    width: 100%;
  }
  .modal-form input:focus, .modal-form select:focus, .modal-form textarea:focus {
    outline: none;
    border-color: var(--sky-500);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(59,130,246,.12);
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 12px; }

  /* EMPTY STATES */

<script>
/* ==========================================================
   STORAGE
   ========================================================== */
const store = {
  async get(key, fallback = null) {
    try {
      if (window.storage) {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : fallback;
      }
    } catch(e) {}
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    } catch(e) { return fallback; }
  },
  async set(key, value) {
    try {
      if (window.storage) {
        await window.storage.set(key, JSON.stringify(value));
        return;
      }
    } catch(e) {}
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
  }
};

/* ==========================================================
   STATE
   ========================================================== */
const state = {
  user: { name: 'Friend', handle: 'you', bio: 'Building a routine that works for me. 🌊', avatar: null },
  tasks: [],
  habits: [],
  meals: {},
  goals: { cal: 2200, protein: 140, carbs: 250, fat: 70 },
  workouts: [],
  workoutLog: {},
  workoutHistory: [],
  personalRecords: {},
  notes: [],
  events: [],
  photos: [],
  chatMessages: [],
  routineMode: 'day',
  currentPage: 'routine',
  today: todayStr()
};

function todayStr(d = new Date()) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDate(d = new Date()) {
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function greeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Still up';
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  if (h < 21) return 'Good evening';
  return 'Good night';
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

/* ==========================================================
   SEED DATA - includes user's actual KOI classes
   ========================================================== */

      { id: uid(), title: 'ICT728 - Capstone Project Lecture', category: 'uni', priority: 'high', time: '12:00', date: nextTue, done: false, notes: '102 Computer Lab, 59 Darby Street' },
      { id: uid(), title: 'ICT728 - Capstone Tutorial', category: 'uni', priority: 'high', time: '13:00', date: nextTue, done: false, notes: '102 Computer Lab' },
      { id: uid(), title: 'ICT762 - Data Analytics Workshop', category: 'uni', priority: 'high', time: '12:00', date: nextThu, done: false, notes: '12 sessions weekly' },
      { id: uid(), title: 'ICT734 - Machine Learning Session', category: 'uni', priority: 'high', time: '18:00', date: nextWed, done: false, notes: 'Online Class · Newcastle Campus' },
      { id: uid(), title: 'ICT731 - Data Mining Session', category: 'uni', priority: 'high', time: '09:00', date: nextSat, done: false, notes: 'Online Class · 9am-12pm' },
      { id: uid(), title: 'Morning workout — Push Day', category: 'fitness', priority: 'med', time: '07:00', date: state.today, done: false },
      { id: uid(), title: 'Review lecture notes', category: 'uni', priority: 'med', time: '20:00', date: state.today, done: false },
    ];
  }
  if (state.habits.length === 0) {
    state.habits = [
      { id: uid(), name: 'Drink 3L water', icon: '💧', color: '#3B82F6', streak: 4, days: {} },
      { id: uid(), name: 'Read 20 minutes', icon: '📚', color: '#8B5CF6', streak: 12, days: {} },

  if (state.workouts.length === 0) {
    state.workouts = [

          { id: uid(), name: 'Tricep Pushdown', sets: 3, reps: 12, weight: 25, unit: 'kg' }
        ]
      },
      {

        exercises: [
          { id: uid(), name: 'Deadlift', sets: 4, reps: 6, weight: 100, unit: 'kg' },
          { id: uid(), name: 'Pull-ups', sets: 4, reps: 8, weight: 0, unit: 'bw' },

          { id: uid(), name: 'Romanian Deadlift', sets: 3, reps: 10, weight: 70, unit: 'kg' },

        ]
      }

  }
  if (state.personalRecords && Object.keys(state.personalRecords).length === 0) {
    state.personalRecords = {
      'Bench Press': { weight: 75, reps: 5, date: '2026-06-20' },

      'Squats': { weight: 95, reps: 5, date: '2026-06-27' }
    };
  }
  if (!state.meals[state.today]) {
    state.meals[state.today] = { breakfast: [], lunch: [], dinner: [], snacks: [] };
  }
  if (state.notes.length === 0) {
    state.notes = [
      { id: uid(), title: 'Semester goals', body: 'Complete all 4 units with distinction. Attend every lecture. Ship the capstone project.', date: state.today }
    ];
  }
  if (state.chatMessages.length === 0) {
    state.chatMessages = [
      {
        role: 'assistant',
        content: `Hey! I'm **Coach Bish**, your personal AI trainer and daily routine assistant. 👋\n\nI'm here to help you:\n\n• Plan your workouts and track your progress\n• Discuss your fitness, nutrition, and wellbeing\n• Guide you through your daily routine\n• Suggest improvements to make you more productive\n\nWhat's on your mind today?`
      }

  }
}

function getNextDayOfWeek(dayOfWeek) {
  const today = new Date();
  const currentDay = today.getDay();
  const daysUntil = ((dayOfWeek - currentDay + 7) % 7) || 7;
  const target = new Date(today);
  target.setDate(today.getDate() + daysUntil);
  return todayStr(target);
}

async function saveAll() {
  await store.set('rf_v3_tasks', state.tasks);
  await store.set('rf_v3_habits', state.habits);
  await store.set('rf_v3_meals', state.meals);
  await store.set('rf_v3_goals', state.goals);

async function loadAll() {
  state.tasks = await store.get('rf_v3_tasks', []);
  state.habits = await store.get('rf_v3_habits', []);
  state.meals = await store.get('rf_v3_meals', {});
  state.goals = await store.get('rf_v3_goals', { cal: 2200, protein: 140, carbs: 250, fat: 70 });
  state.workouts = await store.get('rf_v3_workouts', []);
  state.workoutLog = await store.get('rf_v3_workoutLog', {});

  state.notes = await store.get('rf_v3_notes', []);
  state.events = await store.get('rf_v3_events', []);
  state.photos = await store.get('rf_v3_photos', []);
  state.chatMessages = await store.get('rf_v3_chatMessages', []);
  state.user = await store.get('rf_v3_user', { name: 'Friend', handle: 'you', bio: 'Building a routine that works for me. 🌊', avatar: null });
}


/* ==========================================================
   HELPERS
   ========================================================== */
const $ = sel => document.querySelector(sel);
const main = () => $('#main-view');
const categoryLabel = c => ({ uni: 'Uni', work: 'Work', personal: 'Personal', fitness: 'Fitness', meal: 'Meal' })[c] || c;

function pageHeader(title, sub, actionsHTML = '') {
  return `
    <div class="page-header">
      <div>
        <div class="greeting">${title}</div>
        <div class="date-line">${sub}</div>
        <div class="accent-line"></div>
      </div>
      <div class="header-actions">${actionsHTML}</div>
    </div>
  `;
}

/* ==========================================================
   ROUTINE PAGE — main planner with Day / Week / Month
   ========================================================== */
function renderRoutine() {
  const first = state.user.name.split(' ')[0];
  main().innerHTML = `
    <div class="page-content">
      ${pageHeader(
        `${greeting()}, <em>${escapeHtml(first)}</em>`,
        fmtDate(),
        `
          <div class="routine-mode-tabs">
            <button class="routine-tab ${state.routineMode==='day'?'active':''}" onclick="setRoutineMode('day')">📅 Day</button>
            <button class="routine-tab ${state.routineMode==='week'?'active':''}" onclick="setRoutineMode('week')">📆 Week</button>
            <button class="routine-tab ${state.routineMode==='month'?'active':''}" onclick="setRoutineMode('month')">🗓️ Month</button>
          </div>
          <button class="btn" onclick="openImportInline()">📸 Import photo</button>
          <button class="btn btn-primary" onclick="openTaskModal()">➕ Add task</button>
        `
      )}

      ${renderStatCards()}

      <div id="routine-view">
        ${state.routineMode === 'day' ? renderDayView() : state.routineMode === 'week' ? renderWeekView() : renderMonthView()}
      </div>
    </div>
  `;
}

function setRoutineMode(mode) {
  state.routineMode = mode;
  refresh();
}

function renderStatCards() {
  const todayTasks = state.tasks.filter(t => t.date === state.today);
  const doneTasks = todayTasks.filter(t => t.done).length;
  const totalTasks = todayTasks.length;
  const taskPct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;

  const habitsToday = state.habits.filter(h => h.days[state.today]).length;
  const habitsPct = state.habits.length ? Math.round(habitsToday/state.habits.length*100) : 0;

  const dayMeals = state.meals[state.today] || { breakfast:[], lunch:[], dinner:[], snacks:[] };
  const totalCal = [...dayMeals.breakfast, ...dayMeals.lunch, ...dayMeals.dinner, ...dayMeals.snacks]
    .reduce((s,f) => s + (Number(f.cal) || 0), 0);
  const calPct = Math.min(100, Math.round(totalCal / state.goals.cal * 100));

  const workoutDoneToday = (state.workoutLog[state.today] || []).length;
  const todaysDay = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  const todaysWorkout = state.workouts.find(w => w.day === todaysDay);
  const totalEx = todaysWorkout ? todaysWorkout.exercises.length : 0;
  const workoutPct = totalEx ? Math.round(workoutDoneToday/totalEx*100) : 0;

  return `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon icon-tasks">✓</div>
        <div class="stat-value">${doneTasks}<small>/${totalTasks}</small></div>
        <div class="stat-label">Tasks today</div>
        <div class="stat-progress"><div class="stat-progress-fill" style="width:${taskPct}%; background: linear-gradient(90deg, var(--sky-500), var(--sky-600));"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-habits">🔥</div>
        <div class="stat-value">${habitsToday}<small>/${state.habits.length}</small></div>
        <div class="stat-label">Habits done</div>
        <div class="stat-progress"><div class="stat-progress-fill" style="width:${habitsPct}%; background: linear-gradient(90deg, var(--emerald), #059669);"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-meals">🍎</div>
        <div class="stat-value">${totalCal}<small> kcal</small></div>
        <div class="stat-label">of ${state.goals.cal} goal</div>
        <div class="stat-progress"><div class="stat-progress-fill" style="width:${calPct}%; background: linear-gradient(90deg, var(--amber), #D97706);"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-gym">💪</div>
        <div class="stat-value">${workoutDoneToday}<small>/${totalEx || 0}</small></div>
        <div class="stat-label">${todaysWorkout ? todaysWorkout.name : 'Rest day'}</div>
        <div class="stat-progress"><div class="stat-progress-fill" style="width:${workoutPct}%; background: linear-gradient(90deg, var(--violet), #7C3AED);"></div></div>
      </div>
    </div>
  `;
}

/* DAY VIEW - Google Calendar style */
function renderDayView() {
  const todayTasks = state.tasks.filter(t => t.date === state.today).sort((a,b) => (a.time || '99').localeCompare(b.time || '99'));
  const nowH = new Date().getHours();

  const slots = [];
  for (let h = 6; h <= 23; h++) {
    const hourStr = String(h).padStart(2,'0');
    const slotEvents = todayTasks.filter(t => t.time && parseInt(t.time.split(':')[0]) === h);
    slots.push({ hour: hourStr, events: slotEvents, isNow: h === nowH });
  }

  return `
    <div class="dashboard-grid">
      <div class="card">
        <div class="card-title-row">
          <div class="card-title">Today's schedule <span class="badge">${todayTasks.length} items</span></div>
          <button class="btn btn-ghost" onclick="openTaskModal()" style="padding: 6px 10px; font-size: 12px;">+ Event</button>
        </div>
        <div class="day-calendar">
          ${slots.map(s => `
            <div class="cal-time" style="${s.isNow?'color:var(--sky-600); font-weight:700;':''}">${s.hour}:00</div>
            <div class="cal-slot">
              ${s.events.map(e => `
                <div class="cal-event ${e.category}" onclick="openTaskDetail('${e.id}')">
                  <div>
                    <div class="cal-event-title">
                      ${e.done ? '✓ ' : ''}${escapeHtml(e.title)}
                    </div>
                    <div class="cal-event-sub">${e.time || ''}${e.notes ? ' · ' + escapeHtml(e.notes.slice(0,60)) : ''}</div>
                  </div>
                  ${e.photo ? `<div class="cal-event-photo" style="background-image: url('${e.photo}');"></div>` : ''}
                </div>
              `).join('')}
            </div>
          `).join('')}
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom: 16px;">
          <div class="card-title-row">
            <div class="card-title">Untimed tasks</div>
            <button class="btn btn-ghost" onclick="openTaskModal()" style="padding: 6px 10px; font-size: 12px;">+ Task</button>
          </div>
          <div class="task-list">
            ${todayTasks.filter(t => !t.time).length ?
              todayTasks.filter(t => !t.time).map(t => renderTaskItem(t)).join('') :
              `<div class="empty"><div class="empty-icon">✨</div><div class="empty-title">All scheduled</div><div class="empty-sub">Nice — every task has a home.</div></div>`
            }
          </div>
        </div>

        <div class="card">
          <div class="card-title">Habits <span class="badge">Today</span></div>
          <div id="habits-mini">${renderHabitsMini()}</div>
        </div>
      </div>
    </div>
  `;
}

function renderTaskItem(t) {
  return `
    <div class="task-item ${t.done?'done':''}" onclick="toggleTask('${t.id}')">
      <div class="task-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      ${t.photo ? `<div class="task-photo-thumb" style="background-image: url('${t.photo}');"></div>` : ''}
      <div class="task-title">${escapeHtml(t.title)}</div>
      <div class="task-meta">
        ${t.time ? `<span class="chip chip-time">${t.time}</span>` : ''}
        <span class="chip chip-${t.category}">${categoryLabel(t.category)}</span>
        ${t.priority === 'high' ? `<span class="chip chip-high">!</span>` : ''}
        <button onclick="event.stopPropagation(); openTaskDetail('${t.id}')" style="opacity:.5; padding:4px; font-size: 14px;" title="Edit">⋯</button>
      </div>
    </div>
  `;
}

/* WEEK VIEW - Google Calendar grid style */
function renderWeekView() {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((dayOfWeek + 6) % 7));
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  return `
    <div class="card">
      <div class="card-title-row">
        <div class="card-title">Week of ${monday.toLocaleDateString('en-US', { month:'long', day:'numeric' })}</div>
      </div>
      <div class="week-cal">
        <div class="week-header"></div>
        ${days.map((d,i) => {
          const isToday = todayStr(d) === state.today;
          return `
            <div class="week-header ${isToday?'today':''}">
              ${dayNames[i]}
              <span class="wh-day-num">${d.getDate()}</span>
            </div>
          `;
        }).join('')}

        ${(() => {
          const rows = [];
          for (let h = 7; h <= 22; h++) {
            rows.push(`<div class="week-time-label">${String(h).padStart(2,'0')}:00</div>`);
            days.forEach(d => {
              const ds = todayStr(d);
              const events = state.tasks.filter(t => t.date === ds && t.time && parseInt(t.time.split(':')[0]) === h);
              rows.push(`
                <div class="week-slot">

      <div class="card">
        <div class="card-title">Weekly summary</div>

          const weekTasks = state.tasks.filter(t => days.some(d => todayStr(d) === t.date));

          const totalHabits = state.habits.reduce((sum, h) => sum + days.filter(d => h.days[todayStr(d)]).length, 0);
          const maxHabits = state.habits.length * 7;
          const workouts = days.filter(d => (state.workoutLog[todayStr(d)] || []).length > 0).length;
          return `
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">

                <div class="stat-label">Habits</div>

              <div style="text-align:center; padding:16px; background:var(--surface-2); border-radius:12px;">
                <div class="stat-value" style="color:var(--violet);">${workouts}</div>
                <div class="stat-label">Workouts</div>
              </div>
            </div>
          `;
        })()}
      </div>
      <div class="card">
        <div class="card-title">Habit consistency</div>
        ${state.habits.map(h => {
          const done = days.filter(d => h.days[todayStr(d)]).length;
          const pct = Math.round(done/7*100);
          return `
            <div style="margin-bottom:12px;">
              <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">
                <span>${h.icon} ${escapeHtml(h.name)}</span>

                <div style="height:100%; width:${pct}%; background:${h.color}; border-radius:3px;"></div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

/* MONTH VIEW */
function renderMonthView() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const first = new Date(y, m, 1);
  const startDay = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return `
    <div class="card">
      <div class="card-title">${now.toLocaleDateString('en-US', { month:'long', year:'numeric' })}</div>
      <div class="month-grid" style="margin-bottom:6px;">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => `<div class="month-day-header">${d}</div>`).join('')}
      </div>
      <div class="month-grid">
        ${cells.map(d => {
          if (d === null) return `<div></div>`;
          const ds = todayStr(new Date(y, m, d));
          const dayTasks = state.tasks.filter(t => t.date === ds);
          const isToday = ds === state.today;
          return `
            <div class="month-day ${isToday?'today':''}" onclick="jumpToDay('${ds}')">
              <div style="font-weight: ${isToday?'700':'500'};">${d}</div>
              ${dayTasks.length ? `
                <div style="font-size:9px; color:${isToday?'rgba(255,255,255,.9)':'var(--ink-3)'}; margin-top:auto;">${dayTasks.length} item${dayTasks.length===1?'':'s'}</div>
                <div class="month-day-dot"></div>
              ` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function jumpToDay(ds) {
  state.routineMode = 'day';
  toast('Jumped to ' + ds);
  refresh();
}

function renderHabitsMini() {
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    last7.push(todayStr(d));
  }
  if (!state.habits.length) return `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-title">No habits yet</div></div>`;
  return state.habits.slice(0,5).map(h => `
    <div class="habit-row">
      <div class="habit-info">
        <div class="habit-icon" style="background:${h.color}22; color:${h.color};">${h.icon}</div>
        <div class="habit-details">
          <div class="habit-name">${escapeHtml(h.name)}</div>
          <div class="habit-streak">🔥 ${h.streak} day${h.streak===1?'':'s'}</div>
        </div>
      </div>
      <div class="habit-days">
        ${last7.map(d => `
          <div class="habit-day ${h.days[d]?'done':''} ${d===state.today?'today':''}"
               onclick="toggleHabit('${h.id}','${d}')"
               style="${h.days[d]?`background:${h.color};color:#fff;`:''}">
            ${d.slice(-2)}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

async function uploadAvatar() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      state.user.avatar = ev.target.result;
      await saveAll();
      toast('Profile photo updated');
      updateSidebarUser();
      refresh();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

async function uploadPhoto() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      window.__pendingPhoto = ev.target.result;
      openModal(`

      `);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

async function savePhoto() {

  state.photos.push({

async function toggleExercise(id) {
  if (!state.workoutLog[state.today]) state.workoutLog[state.today] = [];
  const log = state.workoutLog[state.today];
  const idx = log.indexOf(id);
  if (idx >= 0) log.splice(idx, 1); else log.push(id);
  await saveAll();
  refresh();
}

async function finishWorkout(id) {
  const w = state.workouts.find(x => x.id === id);
  if (!w) return;
  const doneToday = state.workoutLog[state.today] || [];
  const doneExercises = w.exercises.filter(ex => doneToday.includes(ex.id));
  if (!doneExercises.length) {
    toast('Complete at least one exercise first');
    return;
  }
  const volume = doneExercises.reduce((s, ex) => s + (ex.sets * ex.reps * (ex.weight || 0)), 0);
  state.workoutHistory.push({
    id: uid(),
    name: w.name,
    date: state.today,
    exercises: doneExercises.length,
    volume,
    duration: Math.round(doneExercises.length * 8)
  });
  await saveAll();
  toast(`Workout logged! ${volume}kg volume 💪`);
  refresh();
}

async function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  state.workouts = state.workouts.filter(w => w.id !== id);
  await saveAll();
  refresh();
}

async function saveWorkout() {
  const name = document.getElementById('w-name').value.trim();
  if (!name) return;
  const lines = document.getElementById('w-exercises').value.split('\n').map(l => l.trim()).filter(Boolean);
  const exercises = lines.map(line => {
    const parts = line.split(',').map(p => p.trim());
    return {
      id: uid(),
      name: parts[0] || 'Exercise',
      sets: parseInt(parts[1]) || 3,
      reps: parseInt(parts[2]) || 10,
      weight: parseFloat(parts[3]) || 0,
      unit: 'kg'
    };
  });
  const muscles = document.getElementById('w-muscles').value.split(',').map(m => m.trim()).filter(Boolean);
  state.workouts.push({
    id: uid(),

async function aiLogFood() {
  const inputEl = document.getElementById('ai-food-input');

  const meal = mealEl.value;

  } catch (err) {
    console.error(err);
    toast('AI logging failed - try manual add');
    inputEl.disabled = false;
  }
}

async function aiEstimateFood(text) {
  const systemPrompt = `You are a nutrition database assistant. When the user describes food they ate, respond with ONLY valid JSON in this format (no markdown, no code fences, no explanation):
{
  "foods": [
    { "name": "Description of the food", "cal": 150, "protein": 12, "carbs": 5, "fat": 8 }
  ]
}
Use standard nutritional estimates. Split into separate items when the user lists multiple foods. Numbers are integers.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 800,
      system: systemPrompt,
      messages: [{ role: "user", content: `Log this food: ${text}` }]
    })
  });
  if (!response.ok) throw new Error('API error');
  const data = await response.json();
  const raw = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();
  const cleaned = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  const parsed = JSON.parse(match ? match[0] : cleaned);
  return parsed.foods || [];
}

    document.getElementById('typing-indicator')?.remove();
    messagesEl.insertAdjacentHTML('beforeend', renderChatMessage({ role: 'assistant', content: reply }));
    messagesEl.scrollTop = messagesEl.scrollHeight;
  } catch (err) {
    console.error(err);
    document.getElementById('typing-indicator')?.remove();
    const errMsg = "Sorry, I couldn't connect right now. Try again in a sec!";
    state.chatMessages.push({ role: 'assistant', content: errMsg });

  } finally {

    sendBtn.disabled = false;

  }

async function callCoachBish(userMessage) {
  const today = state.today;
  const todayTasks = state.tasks.filter(t => t.date === today);
  const todayDone = todayTasks.filter(t => t.done).length;
  const dayMeals = state.meals[today] || { breakfast:[], lunch:[], dinner:[], snacks:[] };
  const totalCal = [...dayMeals.breakfast, ...dayMeals.lunch, ...dayMeals.dinner, ...dayMeals.snacks].reduce((s,f) => s + (Number(f.cal)||0), 0);
  const totalProtein = [...dayMeals.breakfast, ...dayMeals.lunch, ...dayMeals.dinner, ...dayMeals.snacks].reduce((s,f) => s + (Number(f.protein)||0), 0);
  const todaysDayName = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  const todaysWorkout = state.workouts.find(w => w.day === todaysDayName);
  const habitsToday = state.habits.filter(h => h.days[today]).length;
  const bestStreak = Math.max(0, ...state.habits.map(h => h.streak));

  const context = `
USER CONTEXT (${today}, ${todaysDayName}):
- Name: ${state.user.name}
- Tasks today: ${todayDone}/${todayTasks.length} completed
- Task list: ${todayTasks.slice(0,10).map(t => `${t.done?'[✓]':'[ ]'} ${t.title}${t.time?' at '+t.time:''}`).join('; ') || 'none'}
- Today's workout: ${todaysWorkout ? `${todaysWorkout.name} — ${todaysWorkout.exercises.map(e=>e.name).join(', ')}` : 'Rest day'}
- Calories today: ${totalCal}/${state.goals.cal} kcal (${totalProtein}g protein of ${state.goals.protein}g goal)
- Habits done: ${habitsToday}/${state.habits.length}
- Best streak: ${bestStreak} days
- Recent workouts: ${state.workoutHistory.slice(-3).map(w => w.name).join(', ') || 'none yet'}
- PRs: ${Object.entries(state.personalRecords).map(([n,pr]) => `${n} ${pr.weight}kg`).join(', ') || 'none yet'}
  `;

  const systemPrompt = `You are Coach Bish, a warm, motivating, and knowledgeable AI trainer and daily routine assistant.

Personality:
- You're upbeat, encouraging, and never preachy
- You talk like a real coach — direct, warm, occasionally funny
- You use the user's actual data to give specific advice, not generic tips
- You celebrate wins (streaks, PRs, completed tasks) genuinely
- You gently push when they're slacking, but never guilt-trip
- Keep responses SHORT (2-4 sentences usually), unless they ask for detail
- Use **bold** for emphasis on key numbers or actions
- Occasionally use a well-placed emoji (💪 🎯 🔥 ✨) but don't overdo it

You can help with:
- Fitness advice, workout suggestions, exercise form
- Nutrition guidance, calorie/macro discussions
- Daily routine planning and productivity
- Habit building and streak maintenance
- Motivation and mental wellbeing
- Analyzing their day/week based on their actual data below

Never claim to be a licensed medical professional. For medical/serious mental health issues, suggest they see a professional.

${context}

Refer to their real numbers when relevant. If they ask a general question, tailor it to what's happening in their routine today.`;

  const messages = state.chatMessages.slice(-10).map(m => ({
    role: m.role === 'assistant' ? 'assistant' : 'user',
    content: m.content
  }));
  messages.push({ role: 'user', content: userMessage });

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages
    })
  });
  if (!response.ok) throw new Error('API error');
  const data = await response.json();
  return data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();
}

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (file) processFile(file);
    });
  }
  const textArea = document.getElementById('ai-text-input');
  if (textArea) textArea.addEventListener('input', e => { aiState.textInput = e.target.value; });
}

function setAIMode(m) { aiState.mode = m; aiState.extracted = null; refresh(); }
function setAIScope(s) { aiState.scope = s; refresh(); }
function processFile(file) {
  if (!file.type.startsWith('image/')) { toast('Please upload an image'); return; }
  if (file.size > 10 * 1024 * 1024) { toast('Image too large (max 10MB)'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    aiState.imageData = e.target.result.split(',')[1];
    aiState.imageMimeType = file.type;
    refresh();
  };
  reader.readAsDataURL(file);
}
function clearImage() { aiState.imageData = null; aiState.imageMimeType = null; refresh(); }
function toggleAIItem(id) {
  if (aiState.rejected.has(id)) aiState.rejected.delete(id); else aiState.rejected.add(id);
  refresh();
}
function resetAI() {
  aiState.extracted = null;
  aiState.rejected = new Set();
  aiState.imageData = null;
  aiState.imageMimeType = null;
  aiState.textInput = '';
  aiState.loading = false;
  refresh();
}

async function analyzePlan() {
  if (aiState.mode === 'text' && !aiState.textInput.trim()) { toast('Please type your plan'); return; }
  if (aiState.mode === 'image' && !aiState.imageData) { toast('Please upload a screenshot'); return; }

  aiState.loading = true;
  aiState.extracted = null;
  refresh();

  const todayISO = state.today;
  const todayName = new Date().toLocaleDateString('en-US', { weekday: 'long' });

  const systemPrompt = `You extract scheduled items from a user's plan and return JSON.

Today is ${todayName}, ${todayISO}. User scope: ${aiState.scope}.

Return ONLY valid JSON, no markdown, no code fences:
{
  "summary": "one-sentence description",
  "items": [
    {
      "id": "ai_1",
      "title": "Task title",
      "date": "YYYY-MM-DD",
      "time": "HH:MM",
      "category": "uni|work|personal|fitness|meal",
      "priority": "low|med|high"
    }
  ]
}

Rules:
- date: YYYY-MM-DD, calculate relative to today
- time: 24-hour HH:MM, empty string if none
- category: "uni" for classes/lectures/tutorials/exams, "work" for job/shifts/roster, "fitness" for gym/workout, "meal" for meals, "personal" for everything else
- priority: "high" for exams/deadlines, "med" for regular scheduled items, "low" for optional
- Be thorough: extract every distinct item
- For weekly plans starting from a specific day (like "Monday"), calculate proper dates
- If the input is a class timetable, treat all recurring classes as items for this week`;

  const userContent = aiState.mode === 'image' ? [
    { type: 'image', source: { type: 'base64', media_type: aiState.imageMimeType, data: aiState.imageData } },
    { type: 'text', text: 'Extract all scheduled items from this image.' }
  ] : [
    { type: 'text', text: `Extract scheduled items from:\n\n${aiState.textInput}` }
  ];

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2500,
        system: systemPrompt,
        messages: [{ role: "user", content: userContent }]
      })
    });
    if (!response.ok) throw new Error('API error ' + response.status);
    const data = await response.json();
    const raw = data.content.filter(c => c.type === 'text').map(c => c.text).join('\n').trim();
    const cleaned = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
    let parsed;
    try { parsed = JSON.parse(cleaned); }
    catch { const m = cleaned.match(/\{[\s\S]*\}/); if (m) parsed = JSON.parse(m[0]); else throw new Error('parse'); }
    parsed.items = (parsed.items || []).map((item, i) => ({ ...item, id: item.id || `ai_${Date.now()}_${i}` }));
    aiState.extracted = parsed;
    aiState.loading = false;
    aiState.rejected = new Set();
    refresh();
    toast(parsed.items.length ? `Found ${parsed.items.length} items ✨` : 'No items found');
  } catch (err) {
    console.error(err);
    aiState.loading = false;
    aiState.extracted = { summary: `Sorry, I couldn't analyze that. ${err.message}`, items: [] };
    refresh();
    toast('Analysis failed');
  }
}

async function confirmImport() {
  const items = (aiState.extracted?.items || []).filter(i => !aiState.rejected.has(i.id));
  if (!items.length) return;
  for (const item of items) {

      category: item.category || 'personal',
      priority: item.priority || 'med',
      date: item.date || state.today,
      time: item.time || '',
      done: false
    });
  }
  await saveAll();
  toast(`Added ${items.length} items 🎉`);
  resetAI();
  navigateTo('routine');
}

/* ==========================================================

   ========================================================== */
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target.id === 'modal-backdrop') closeModal();
});

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 1800);
  setTimeout(() => t.remove(), 2400);
}

   ========================================================== */
function navigateTo(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  document.querySelector('.routine-hero')?.classList.toggle('active', page === 'routine');
  refresh();
}

function refresh() {
  const renderers = {
    routine: renderRoutine,
    profile: renderProfile,
    fitness: renderFitness,
    meals: renderMeals,
    habits: renderHabits,
    coach: renderCoach,
    import: renderImport,
    notes: renderNotes,
    analytics: renderAnalytics
  };
  (renderers[state.currentPage] || renderRoutine)();
}

document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => navigateTo(n.dataset.page));
});

   FIRST-RUN & BOOT
   ========================================================== */
async function promptNameIfNeeded() {
  if (state.user.name === 'Friend') {
    setTimeout(() => {
      openModal(`
        <h3>Welcome to RoutineFlow Pro</h3>
        <div class="modal-sub">Let's personalize this. What's your first name?</div>
        <div class="modal-form">
          <input id="user-name-input" placeholder="Your name" autofocus>
          <div class="modal-actions">
            <button class="btn btn-primary" onclick="setName()">Let's go →</button>
          </div>
        </div>
      `);
    }, 400);
  }
}
async function setName() {
  const name = document.getElementById('user-name-input').value.trim();
  if (!name) return;
  state.user.name = name;
  state.user.handle = name.toLowerCase().replace(/\s+/g,'');
  await saveAll();
  updateSidebarUser();
  closeModal();
  refresh();
}

(async function boot() {
  await loadAll();
  seedIfEmpty();
  await saveAll();
  updateSidebarUser();
  refresh();
  promptNameIfNeeded();

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); openTaskModal(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); navigateTo('coach'); }
  });
})();


</script>
</body>
</html>
